<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Connection Screen</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "background": "#f7f9fb",
                      "on-secondary": "#ffffff",
                      "secondary-container": "#dae2fd",
                      "tertiary-container": "#5e6e85",
                      "surface-dim": "#d8dadc",
                      "on-tertiary-fixed-variant": "#38485d",
                      "error": "#ba1a1a",
                      "tertiary": "#46566c",
                      "on-secondary-fixed": "#131b2e",
                      "surface-tint": "#0053db",
                      "surface-container-highest": "#e0e3e5",
                      "tertiary-fixed-dim": "#b7c8e1",
                      "inverse-primary": "#b4c5ff",
                      "outline-variant": "#c3c6d7",
                      "tertiary-fixed": "#d3e4fe",
                      "inverse-on-surface": "#eff1f3",
                      "surface-container": "#eceef0",
                      "primary-fixed-dim": "#b4c5ff",
                      "on-error-container": "#93000a",
                      "primary": "#004ac6",
                      "primary-container": "#2563eb",
                      "secondary-fixed-dim": "#bec6e0",
                      "on-primary-fixed": "#00174b",
                      "secondary": "#565e74",
                      "on-secondary-container": "#5c647a",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-high": "#e6e8ea",
                      "on-surface": "#191c1e",
                      "surface-bright": "#f7f9fb",
                      "on-tertiary-container": "#e9f0ff",
                      "secondary-fixed": "#dae2fd",
                      "surface": "#f7f9fb",
                      "on-error": "#ffffff",
                      "on-primary": "#ffffff",
                      "on-primary-container": "#eeefff",
                      "on-tertiary": "#ffffff",
                      "on-secondary-fixed-variant": "#3f465c",
                      "on-surface-variant": "#434655",
                      "inverse-surface": "#2d3133",
                      "error-container": "#ffdad6",
                      "surface-variant": "#e0e3e5",
                      "on-background": "#191c1e",
                      "on-primary-fixed-variant": "#003ea8",
                      "primary-fixed": "#dbe1ff",
                      "outline": "#737686",
                      "surface-container-low": "#f2f4f6",
                      "on-tertiary-fixed": "#0b1c30"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "container_gutter": "24px",
                      "xl": "32px",
                      "lg": "24px",
                      "sidebar_width": "260px",
                      "sm": "8px",
                      "md": "16px",
                      "xs": "4px",
                      "unit": "8px",
                      "xxl": "48px"
              },
              "fontFamily": {
                      "display-lg": [
                              "Inter"
                      ],
                      "label-uppercase": [
                              "Inter"
                      ],
                      "title-sm": [
                              "Inter"
                      ],
                      "body-base": [
                              "Inter"
                      ],
                      "code-terminal": [
                              "monospace"
                      ],
                      "headline-md": [
                              "Inter"
                      ],
                      "body-sm": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "display-lg": [
                              "36px",

                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "label-uppercase": [
                              "12px",

                                      "fontWeight": "600"

                      ],
                      "title-sm": [
                              "18px",

                                      "fontWeight": "600"

                      ],
                      "body-base": [

                                      "fontWeight": "400"
                              }
                      ],
                      "code-terminal": [
                              "13px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "450"
                              }
                      ],
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "600"

                      ],
                      "body-sm": [

                              {
                                      "lineHeight": "18px",
                                      "fontWeight": "400"
                              }
                      ]
              }
      },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-container_gutter antialiased">
<!-- Main Connection Card -->
<div class="w-full max-w-[440px] bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-xl flex flex-col gap-xl">
<!-- Header -->
<div class="flex flex-col items-center text-center gap-md">
<div class="w-16 h-16 bg-surface-container flex items-center justify-center rounded-xl border border-surface-variant">
<span class="material-symbols-outlined text-[32px] text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">dns</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-on-surface">System Console</h1>
<p class="font-body-base text-body-base text-on-surface-variant mt-xs">Establish a secure connection to the host server to continue.</p>
</div>
</div>
<!-- Connection Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<div class="flex flex-col gap-md">
<!-- IP Address Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-uppercase text-label-uppercase text-on-surface-variant uppercase" for="ip-address">Server IP Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">computer</span>
<input class="w-full h-[40px] pl-[36px] pr-md bg-surface-container-lowest border border-outline-variant rounded font-code-terminal text-code-terminal text-on-surface placeholder:text-outline/70 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="ip-address" name="ip-address" placeholder="e.g., 192.168.1.100" type="text"/>
</div>
</div>
<!-- Port Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-uppercase text-label-uppercase text-on-surface-variant uppercase" for="port-number">Port Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">power</span>
<input class="w-full h-[40px] pl-[36px] pr-md bg-surface-container-lowest border border-outline-variant rounded font-code-terminal text-code-terminal text-on-surface placeholder:text-outline/70 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="port-number" name="port-number" placeholder="e.g., 8080" type="text"/>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[40px] bg-primary text-on-primary font-title-sm text-title-sm rounded flex items-center justify-center gap-sm hover:bg-primary/90 active:scale-[0.99] transition-all cursor-pointer shadow-sm" type="submit">
                Connect
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Status Area -->
<div class="pt-md border-t border-surface-variant flex items-center justify-center gap-sm">
<div class="w-2 h-2 rounded-full bg-outline"></div>
<span class="font-body-sm text-body-sm text-on-surface-variant">Ready to connect</span>
</div>
</div>
</body></html>
