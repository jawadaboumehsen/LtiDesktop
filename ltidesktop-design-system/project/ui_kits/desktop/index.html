<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LtiPatcher · UI Kit</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0A0A0A; color: #fff;
    font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  body { overflow: hidden; }
  #root { width: 100vw; height: 100vh; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  ::selection { background: rgba(0,229,255,.30); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/Icon.jsx"></script>
<script type="text/babel" src="components/Primitives.jsx"></script>
<script type="text/babel" src="components/Sidebar.jsx"></script>
<script type="text/babel" src="components/TopBar.jsx"></script>
<script type="text/babel" src="components/Splash.jsx"></script>
<script type="text/babel" src="components/Connect.jsx"></script>
<script type="text/babel" src="components/Home.jsx"></script>
<script type="text/babel" src="components/Dashboard.jsx"></script>
<script type="text/babel" src="components/Files.jsx"></script>
<script type="text/babel" src="components/Console.jsx"></script>
<script type="text/babel" src="components/Settings.jsx"></script>
<script type="text/babel" src="components/App.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
