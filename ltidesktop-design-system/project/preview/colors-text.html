<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg);font-family:var(--font-sans);height:100%}
  .wrap{padding:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .row{border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;background:var(--surface)}
  .sample{font-size:14px;color:var(--fg);margin-bottom:6px}
  .sample.sec{color:var(--fg-secondary)}
  .sample.muted{color:var(--fg-muted)}
  .name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-secondary);margin-left:8px}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="sample">Pure white text on root</div><span class="name">fg</span><span class="hex">#FFFFFF</span></div>
  <div class="row"><div class="sample sec">Secondary zinc text</div><span class="name">fg secondary</span><span class="hex">#A1A1AA</span></div>
  <div class="row"><div class="sample muted">Placeholder muted text</div><span class="name">fg muted</span><span class="hex">A1A1AA / 50%</span></div>
  <div class="row"><div class="sample" style="color:#00E5FF">Cyan link / focus</div><span class="name">primary</span><span class="hex">#00E5FF</span></div>
</div>
</body></html>
