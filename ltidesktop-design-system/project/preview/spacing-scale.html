<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg);font-family:var(--font-sans);height:100%}
  .wrap{padding:16px;display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:center;gap:12px}
  .box{background:var(--primary);height:14px;border-radius:2px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-secondary);width:64px}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg)}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="lbl">space-1</span><div class="box" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="lbl">space-2</span><div class="box" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="lbl">space-3</span><div class="box" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="lbl">space-4</span><div class="box" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="lbl">space-5</span><div class="box" style="width:20px"></div><span class="px">20px</span></div>
  <div class="row"><span class="lbl">space-6</span><div class="box" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="lbl">space-8</span><div class="box" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="lbl">space-12</span><div class="box" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="lbl">space-16</span><div class="box" style="width:64px"></div><span class="px">64px</span></div>
</div>
</body></html>
