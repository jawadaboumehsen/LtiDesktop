<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg);font-family:var(--font-sans);height:100%}
  .wrap{padding:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .card{background:#0C0C0C;border:1px solid rgba(38,38,38,.5);border-radius:4px;padding:16px;display:flex;flex-direction:column;gap:8px}
  .top{display:flex;align-items:center;gap:12px}
  .ico{width:40px;height:40px;border-radius:4px;display:flex;align-items:center;justify-content:center}
  .ico svg{width:20px;height:20px;fill:none;stroke-width:2}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-secondary)}
  .val{display:flex;align-items:baseline;gap:8px}
  .num{font-size:20px;font-weight:700;letter-spacing:-.02em;color:#fff}
  .sub{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500}
  .dot{width:8px;height:8px;border-radius:0}
</style></head><body>
<div class="wrap">
  <div class="card">
    <div class="top">
      <div class="ico" style="background:rgba(0,255,170,.10)"><svg viewBox="0 0 24 24" stroke="#00FFAA"><rect x="2" y="4" width="20" height="6" rx="1"/><rect x="2" y="14" width="20" height="6" rx="1"/><path d="M6 8h.01M6 18h.01"/></svg></div>
      <span class="lbl">Connection Status</span>
    </div>
    <div class="val"><span class="num">Active</span><span class="sub" style="color:#00FFAA"><span class="dot" style="background:#00FFAA"></span>Stable</span></div>
  </div>
  <div class="card">
    <div class="top">
      <div class="ico" style="background:rgba(0,229,255,.10)"><svg viewBox="0 0 24 24" stroke="#00E5FF"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></div>
      <span class="lbl">Total Commands</span>
    </div>
    <div class="val"><span class="num">1,240</span><span class="sub" style="color:var(--fg-secondary)">Last 24h</span></div>
  </div>
  <div class="card">
    <div class="top">
      <div class="ico" style="background:rgba(0,229,255,.10)"><svg viewBox="0 0 24 24" stroke="#00E5FF"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/></svg></div>
      <span class="lbl">System Uptime</span>
    </div>
    <div class="val"><span class="num">4h 12m</span><span class="sub" style="color:var(--fg-secondary)">Since last reboot</span></div>
  </div>
</div>
</body></html>
