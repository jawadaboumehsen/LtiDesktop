<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg);font-family:var(--font-sans);height:100%}
  .wrap{padding:16px;display:flex;flex-direction:column;gap:6px}
  .row{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--border-soft);padding-bottom:6px}
  .row:last-child{border-bottom:0}
  .lbl{font-size:10px;font-family:var(--font-mono);color:var(--fg-secondary);width:120px;flex-shrink:0}
  .specimen{flex:1}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="lbl">display 20/28/700</span><span class="specimen t-display">System Dashboard</span></div>
  <div class="row"><span class="lbl">headline 16/24/600</span><span class="specimen t-headline">Recent Activity Logs</span></div>
  <div class="row"><span class="lbl">title 14/20/600</span><span class="specimen t-title">System Performance</span></div>
  <div class="row"><span class="lbl">body 13/18/400</span><span class="specimen t-body">Overview of network health and activity.</span></div>
</div>
</body></html>
