<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg);font-family:var(--font-sans);height:100%}
  .wrap{padding:18px;display:flex;flex-direction:column;gap:14px}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-secondary);margin-bottom:4px}
  .input{display:flex;align-items:center;gap:8px;height:36px;padding:0 12px;background:transparent;border:1px solid #262626;border-radius:2px;font-family:var(--font-mono);font-size:13px;color:#fff}
  .input.focused{border-color:#00E5FF}
  .input svg{width:18px;height:18px;stroke:#A1A1AA;fill:none;stroke-width:1.6}
  .input input{flex:1;background:transparent;border:none;color:inherit;font:inherit;outline:none}
  .input input::placeholder{color:rgba(161,161,170,.5)}
</style></head><body>
<div class="wrap">
  <div class="field"><label>Server IP Address</label>
    <div class="input focused"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><input value="192.168.1.100"></div>
  </div>
  <div class="field"><label>Port Number</label>
    <div class="input"><svg viewBox="0 0 24 24"><path d="M18 8h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2M6 8H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2M12 2v20"/></svg><input placeholder="e.g., 8080"></div>
  </div>
</div>
</body></html>
