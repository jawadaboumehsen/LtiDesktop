<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg);font-family:var(--font-sans);height:100%}
  .wrap{padding:24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 12px;border-radius:2px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
  .btn.primary{background:rgba(0,229,255,.10);border:1px solid rgba(0,229,255,.5);color:#00E5FF}
  .btn.primary:hover{background:rgba(0,229,255,.20)}
  .btn.secondary{background:#161616;border:1px solid #262626;color:#fff}
  .btn.secondary:hover{background:#1E1E1E}
  .btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
  .btn.text{background:transparent;border:none;color:var(--fg-secondary);text-transform:uppercase;letter-spacing:.04em;font-size:11px;font-weight:600}
</style></head><body>
<div class="wrap">
  <button class="btn primary"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>Connect</button>
  <button class="btn primary"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>Refresh Data</button>
  <button class="btn secondary">Apply Changes</button>
  <button class="btn text">Reset to Default</button>
</div>
</body></html>
