<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg);font-family:var(--font-sans);height:100%}
  .wrap{display:flex;height:100%}
  .rail{width:200px;background:#0C0C0C;border-right:1px solid #1A1A1A;padding:16px 0}
  .item{display:flex;align-items:center;gap:12px;padding:8px 12px;margin:0 8px 4px;border-radius:4px;font-size:13px;color:var(--fg-secondary);position:relative;cursor:pointer}
  .item.active{background:#121212;color:#fff;font-weight:500}
  .item.active::before{content:"";position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:#00E5FF;border-radius:2px}
  .item.active svg{stroke:#00E5FF}
  .item:hover:not(.active){background:rgba(22,22,22,.5);color:#fff}
  .item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
  .body{flex:1;padding:16px;color:var(--fg-secondary);font-size:11px;font-family:var(--font-mono)}
</style></head><body>
<div class="wrap">
  <div class="rail">
    <div class="item active"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</div>
    <div class="item"><svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>Remote Console</div>
    <div class="item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>System Settings</div>
  </div>
  <div class="body">// active = #121212 + 3×20 cyan indicator at x=-16</div>
</div>
</body></html>
