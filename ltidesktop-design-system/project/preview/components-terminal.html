<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg);font-family:var(--font-sans);height:100%}
  .term{margin:14px;background:#000;border:1px solid #262626;border-radius:4px;overflow:hidden}
  .head{height:32px;display:flex;align-items:center;gap:16px;padding:0 16px;background:#0A0A0A;border-bottom:1px solid #262626}
  .dots{display:flex;gap:8px}
  .dots i{width:12px;height:12px;background:#1E1E1E;border-radius:6px}
  .path{display:flex;align-items:center;gap:4px;color:var(--fg-secondary);font-family:var(--font-mono);font-size:11px}
  .path svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
  .body{padding:12px 16px;font-family:var(--font-mono);font-size:13px;line-height:20px}
  .body div{display:flex;gap:12px}
  .tag{font-weight:700;opacity:.5}
  .cmd{color:#00FFAA}.sys{color:#00E5FF}.warn{color:#FFD600}.err{color:#FF3366}.normal{color:#E4E4E7}
</style></head><body>
<div class="term">
  <div class="head"><div class="dots"><i></i><i></i><i></i></div>
    <div class="path"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>root@corp-sys-prod-01:~</div></div>
  <div class="body">
    <div><span class="tag cmd">[CMD]</span><span class="cmd">$ systemctl status nginx</span></div>
    <div><span class="tag sys">[SYS]</span><span class="sys">connection established to 192.168.1.100:8080</span></div>
    <div><span class="tag warn">[WARN]</span><span class="warn">memory usage at 94% on worker beta-03</span></div>
    <div><span class="tag err">[ERROR]</span><span class="err">timeout after 5000ms</span></div>
    <div><span class="tag normal">[NORMAL]</span><span class="normal">build complete in 4.2s</span></div>
  </div>
</div>
</body></html>
